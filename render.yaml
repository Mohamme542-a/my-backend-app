# Render Blueprint - https://render.com/docs/blueprint-spec
services:
  - type: web
    name: qarfash-api
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: FIREBASE_DB_URL
        sync: false
      - key: FIREBASE_DB_SECRET
        sync: false
      - key: API_CLIENT_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: SELF_URL
        sync: false
